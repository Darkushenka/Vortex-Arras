<!doctype html>
<html lang="en" id="mainBody">
<head>
    <meta charset="UTF-8">
    <title>Vortex Arras</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no">

    <link href="https://fonts.googleapis.com/css?family=Ubuntu:400,700" rel="stylesheet">
    <link rel="stylesheet" href="css/main.css" />

    <style>
        body { overflow:hidden; }
    </style>

    <!-- Version Control -->
    <script>
        var VERSION = localStorage.getItem('versionHash');
        var RELOAD_FOR = localStorage.getItem('_vcReloadFor');
        (function versionControl() {
            let request = new XMLHttpRequest();
            let url = "/api/vhash";
            return new Promise((resolve, reject) => {
                request.open('GET', url);
                request.onload = () => resolve(request.response);
                request.onerror = () => reject(request.statusText);
                request.send();
            });
        })().then(function resolveVersion(data) {
            var isValid = data && data.length > 0 && data.length < 200 && data.indexOf(' ') === -1;
            if (!isValid) return;
            localStorage.setItem('versionHash', data);
            if (VERSION !== data && RELOAD_FOR !== data) {
                localStorage.setItem('_vcReloadFor', data);
                localStorage.setItem('updated', 'datgudshit');
                location.reload(true);
            } else {
                localStorage.removeItem('_vcReloadFor');
            }
        }).catch(function() {});
    </script>
</head>

<body oncontextmenu="return false;" id="mainBody">

<div id="gameAreaWrapper">
    <canvas id="gameCanvas" tabindex="1"></canvas>
</div>

<div id="mainWrapper">
    <div id="startMenuWrapper">
        <div id="startMenu">

            <!-- Хули ты код элемента чекаешь сьебался НАХУЙ отсюда -->
            <div id="twitterHolder" class="startMenuHolder"></div>

            <div class="startMenuHolder">
                <div class="sliderHolder">

                    <!-- Как блять размер этой хйуни поменять чтобы оно не вылетало за границу -->
                    <div class="slider" id="startMenuSlidingContent">
                        <img src="/favicons/Vortex.png" class="logo" style="width: 100px; height: auto;" />                                                 <h1>Vortex Arras</h1>
                        <div id="serverName">
                            <h4 class="nopadding">Connecting...</h4>
                        </div>

                        <input type="text"
                               autofocus
                               tabindex="1"
                               spellcheck="false"
                               placeholder="Hi! How are you?"
                               id="playerNameInput"
                               maxlength="24" />

                        <input type="text"
                               class="conceal"
                               tabindex="3"
                               placeholder="Leave this blank."
                               id="playerKeyInput"
                               maxlength="64" />
                    </div>

                    <!-- Вованя литвин 46 -->
                    <div class="slider" id="startMenuSlidingTrigger">
                        <h3 class="nopadding">view options/help 🡲</h3>
                    </div>

                    <!-- фывфырвыфвщгырвщфырвфыщврфывщыфрвыфвряотущыващывраыгщвармчсрмсчот -->
                    <div class="slider">
                        <br>
                        <optionsHeader>Advanced Controls:</optionsHeader><br>

                        <table>
                            <tr>
                                <td><b>E</b>: auto-fire</td>
                                <td><b>C</b>: auto-spin</td>
                            </tr>
                            <tr>
                                <td><b>R</b>: disable auto-weapons</td>
                                <td><b>N</b>: level up (sandbox)</td>
                            </tr>
                        </table>

                        <optionsHeader>Options:</optionsHeader>

                        <select id="optColors">
                            <option value="normal">Light Colors</option>
                            <option value="dark">Dark Colors</option>
                            <option value="natural">Natural</option>
                            <option value="classic">Classic</option>
                            <option value="forest">Forest</option>
                            <option value="midnight">Midnight</option>
                            <option value="pastel">Snow</option>
                            <option value="ocean">Coral Reef</option>
                            <option value="badlands">Badlands</option>
                            <option value="bleach">Bleach</option>
                        </select>

                        <select id="optBorders">
                            <option value="normal">Soft Borders</option>
                            <option value="dark">Dark Borders</option>
                            <option value="neon">Neon Mode</option>
                            <option value="glass">Glass Mode</option>
                        </select>

                        <table>
                            <tr>
                                <td>
                                    <label>
                                        <input id="optScreenshotMode" class="checkbox" type="checkbox">
                                        Screenshot Mode
                                    </label>
                                </td>
                                <td>
                                    <label>
                                        <input id="optNoPointy" class="checkbox" type="checkbox">
                                        Classic Traps
                                    </label>
                                </td>
                            </tr>
                            <tr>
                                <td>
                                    <label>
                                        <input id="optFancy" class="checkbox" type="checkbox">
                                        Low Graphics
                                    </label>
                                </td>
                                <td>
                                    <label>
                                        <input id="optPredictive" class="checkbox" type="checkbox">
                                        Disable Hyperactivity
                                    </label>
                                </td>
                            </tr>
                        </table>
                    </div>

                </div>

                <div style="position: relative; bottom: -10px;">
                    <button id="startButton" tabindex="2">Play</button>
                </div>
            </div>

            <!-- CHANGELOG оставлен -->
            <div class="startMenuHolder" allowtransparency="true">
                <iframe id="patchNotesIFrame"
                        src="changelog.html"
                        seamless
                        frameBorder="0">
                </iframe>
            </div>

        </div>
    </div>
</div>

<!-- JS -->
<script src="//code.jquery.com/jquery-2.2.0.min.js"></script>
<script src="js/app.js"></script>

<!-- Скрипт для Options -->
<script>
var clicked = true;
$("#startMenuSlidingTrigger").on('click', function() {
    if(clicked) {
        clicked = false;
        $(this).html('<h3 class="nopadding">close options/help 🡶</h3>');
        $(".slider").css({"top": "-265px"});
    } else {
        clicked = true;
        $(this).html('<h3 class="nopadding">view options/help 🡲</h3>');
        $(".slider").css({"top": 0});
    }
});
</script>

</body>
</html>
